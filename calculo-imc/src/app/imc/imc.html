<h1>Calculadora IMC</h1>
<input type="number" [(ngModel)]="peso" placeholder="Peso(kg)"><br><br>
<input type="number" [(ngModel)]="altura" placeholder="Altura"><br>
<button (click)="calcularIMC()">Calcular</button>
<div *ngIf="imc > 0">
  <p>Seu IMC:{{ imc | number:'1.2-2' }}</p>
  <p>Situação:<strong>{{ resultado }}</strong></p>
</div>
